<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정기시험 | 동국대학교사범대학부속중학교</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #f5f2ea;
    --bg-card: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #8a8a8a;
    --navy: #1e3a5f;
    --accent: #a83232;
    --accent-soft: #fff8f0;
    --prep: #1e3a5f;
    --rest: #5a7a3a;
    --move: #8a5a2b;
    --line: #d4cfc0;
    --line-soft: #e5e1d5;
    --past-bg: #ece9e0;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", sans-serif;
    position: relative;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* === 4개 모서리 코너 마크 === */
  .corner {
    position: fixed;
    width: 42px;
    height: 42px;
    pointer-events: none;
    z-index: 5;
  }
  .corner::before,
  .corner::after {
    content: '';
    position: absolute;
    background: var(--navy);
  }
  .corner.tl { top: 24px; left: 24px; }
  .corner.tr { top: 24px; right: 24px; }
  .corner.bl { bottom: 24px; left: 24px; }
  .corner.br { bottom: 24px; right: 24px; }
  .corner.tl::before { top: 0; left: 0; width: 100%; height: 2px; }
  .corner.tl::after  { top: 0; left: 0; width: 2px; height: 100%; }
  .corner.tr::before { top: 0; right: 0; width: 100%; height: 2px; }
  .corner.tr::after  { top: 0; right: 0; width: 2px; height: 100%; }
  .corner.bl::before { bottom: 0; left: 0; width: 100%; height: 2px; }
  .corner.bl::after  { bottom: 0; left: 0; width: 2px; height: 100%; }
  .corner.br::before { bottom: 0; right: 0; width: 100%; height: 2px; }
  .corner.br::after  { bottom: 0; right: 0; width: 2px; height: 100%; }

  /* === 좌우 세로 악센트 바 === */
  .accent-bar {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 30vh;
    background: var(--accent);
    z-index: 4;
  }
  .accent-bar.left { left: 0; }
  .accent-bar.right { right: 0; }

  /* === 메인 컨테이너 === */
  .main {
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    padding: 4vh 6vw 3vh;
    position: relative;
  }

  /* === 상단 헤더 === */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(18px, 3vw, 40px);
    margin-bottom: 2vh;
  }

  .header img {
    width: clamp(50px, 5.5vw, 80px);
    height: auto;
  }

  .header .school-name {
    font-weight: 700;
    font-size: clamp(1.4rem, 2.8vw, 2.3rem);
    letter-spacing: 0.05em;
    color: var(--navy);
  }

  .header .divider-v {
    width: 2px;
    height: clamp(40px, 5vh, 60px);
    background: var(--line);
  }

  .header .exam-title {
    font-weight: 700;
    font-size: clamp(1.5rem, 3vw, 2.5rem);
    letter-spacing: 0.4em;
    text-indent: 0.4em;
    color: var(--accent);
  }

  /* === 대시보드 본문 (2-column) === */
  .dashboard {
    flex: 1;
    display: grid;
    grid-template-columns: minmax(260px, 24%) 1fr;
    gap: clamp(12px, 1.5vw, 24px);
    min-height: 0;
    padding-top: 1vh;
    max-width: 1500px;
    width: 100%;
    margin: 0 auto;
    justify-self: center;
  }

  /* === 좌측: 세로 타임라인 (우측 정렬로 중앙과 가깝게) === */
  .timeline {
    position: relative;
    padding: 1vh 0 1vh 28px;
    overflow-y: auto;
    justify-self: end;
    width: 100%;
    max-width: 340px;
  }

  /* 세로 기준선 */
  .timeline::before {
    content: '';
    position: absolute;
    left: 9px;
    top: 1vh;
    bottom: 1vh;
    width: 2px;
    background: var(--line);
  }

  .tl-item {
    position: relative;
    padding-left: 18px;
    padding-bottom: 1.2vh;
  }

  .tl-item:last-child {
    padding-bottom: 0;
  }

  /* 점 표시 */
  .tl-item::before {
    content: '';
    position: absolute;
    left: -25px;
    top: 0.35em;
    width: 12px;
    height: 12px;
    background: var(--bg);
    border: 2px solid var(--ink-muted);
    border-radius: 50%;
    transition: all 0.5s ease;
    z-index: 2;
  }

  .tl-time {
    font-weight: 700;
    font-size: clamp(1rem, 1.5vw, 1.25rem);
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  .tl-label {
    font-weight: 500;
    font-size: clamp(0.85rem, 1.2vw, 1.05rem);
    color: var(--ink-soft);
    margin-top: 2px;
    letter-spacing: 0.03em;
  }

  /* 활동 유형별 좌측 테두리 색 */
  .tl-item.prep::before { border-color: var(--prep); }
  .tl-item.exam::before { border-color: var(--accent); }
  .tl-item.rest::before { border-color: var(--rest); }
  .tl-item.move::before { border-color: var(--move); }

  /* 현재 활동 강조 */
  .tl-item.current::before {
    width: 18px;
    height: 18px;
    left: -28px;
    top: 0.2em;
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(168, 50, 50, 0.15);
  }

  .tl-item.current .tl-time {
    color: var(--accent);
    font-size: clamp(1.15rem, 1.7vw, 1.4rem);
  }

  .tl-item.current .tl-label {
    color: var(--accent);
    font-weight: 700;
  }

  /* 지나간 활동 */
  .tl-item.past {
    opacity: 0.4;
  }

  /* === 우측: 메인 상태 표시 === */
  .main-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 2vh;
    justify-self: start;
    width: 100%;
    max-width: 820px;
  }

  /* 현재시각 */
  .clock-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .clock-label {
    font-weight: 600;
    font-size: clamp(0.85rem, 1.3vw, 1.1rem);
    letter-spacing: 0.4em;
    text-indent: 0.4em;
    color: var(--ink-muted);
    margin-bottom: 0.5vh;
    padding: 4px 16px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  .clock {
    font-weight: 700;
    font-size: clamp(7rem, 17vw, 16rem);
    line-height: 0.9;
    letter-spacing: -0.03em;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
  }

  .clock .colon {
    margin: 0 0.03em;
    color: var(--accent);
  }

  .date-line {
    font-weight: 500;
    font-size: clamp(1rem, 1.6vw, 1.3rem);
    letter-spacing: 0.15em;
    color: var(--ink-soft);
    margin-top: 0.5vh;
  }

  /* 현재 상태 카드 */
  .status-card {
    width: 100%;
    max-width: 720px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-top: 5px solid var(--navy);
    border-radius: 4px;
    padding: clamp(18px, 2.5vh, 32px) clamp(24px, 3vw, 48px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8vh;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    transition: all 0.5s ease;
  }

  .status-card.exam {
    border-top-color: var(--accent);
    background: var(--accent-soft);
  }

  .status-card.rest {
    border-top-color: var(--rest);
  }

  .status-card.move {
    border-top-color: var(--move);
  }

  .status-card.ended {
    opacity: 0.6;
    border-top-color: var(--ink-muted);
  }

  .status-label {
    font-weight: 600;
    font-size: clamp(0.9rem, 1.3vw, 1.1rem);
    letter-spacing: 0.3em;
    text-indent: 0.3em;
    color: var(--ink-muted);
  }

  .status-title {
    font-weight: 700;
    font-size: clamp(2rem, 4.5vw, 3.8rem);
    letter-spacing: 0.08em;
    color: var(--navy);
    text-align: center;
  }

  .status-card.exam .status-title {
    color: var(--accent);
  }

  .status-card.rest .status-title {
    color: var(--rest);
  }

  .status-card.move .status-title {
    color: var(--move);
  }

  .status-time {
    font-weight: 700;
    font-size: clamp(1.3rem, 2.4vw, 2rem);
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  .status-sub {
    font-size: clamp(0.95rem, 1.4vw, 1.15rem);
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    text-align: center;
    margin-top: 0.3vh;
  }

  /* 세로 화면 대응 */
  @media (max-aspect-ratio: 4/3) {
    .dashboard {
      grid-template-columns: minmax(240px, 35%) 1fr;
    }
    .clock {
      font-size: clamp(6rem, 15vw, 14rem);
    }
  }

  /* 초소형 화면 대응 */
  @media (max-width: 700px) {
    .corner { width: 28px; height: 28px; }
    .corner.tl { top: 14px; left: 14px; }
    .corner.tr { top: 14px; right: 14px; }
    .corner.bl { bottom: 14px; left: 14px; }
    .corner.br { bottom: 14px; right: 14px; }
    .accent-bar { height: 20vh; width: 4px; }
    .header {
      flex-direction: column;
      gap: 8px;
    }
    .header .divider-v {
      display: none;
    }
    .dashboard {
      grid-template-columns: 1fr;
      gap: 2vh;
    }
    .timeline {
      max-height: 30vh;
    }
  }
</style>
</head>
<body>

  <!-- 4개 모서리 -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- 좌우 악센트 바 -->
  <div class="accent-bar left"></div>
  <div class="accent-bar right"></div>

  <div class="main">

    <!-- 상단 헤더 -->
    <div class="header">
      <img src="school-logo.png" alt="학교 로고">
      <div class="school-name">동국대학교사범대학부속중학교</div>
      <div class="divider-v"></div>
      <div class="exam-title">정기시험</div>
    </div>

    <!-- 대시보드 본문 -->
    <div class="dashboard">

      <!-- 좌측: 타임라인 -->
      <div class="timeline" id="timeline">
        <!-- JS로 동적 생성 -->
      </div>

      <!-- 우측: 현재 상태 -->
      <div class="main-display">

        <div class="clock-box">
          <div class="clock-label">현재시각</div>
          <div class="clock">
            <span id="hours">--</span><span class="colon">:</span><span id="minutes">--</span>
          </div>
          <div class="date-line" id="date">&nbsp;</div>
        </div>

        <div class="status-card" id="status-card">
          <div class="status-label" id="status-label">현재</div>
          <div class="status-title" id="status-title">-</div>
          <div class="status-time" id="status-time">-</div>
          <div class="status-sub" id="status-sub">&nbsp;</div>
        </div>

      </div>

    </div>

  </div>

<script>
  // ============================================================
  // 시간표 정의 (분 단위)
  //   type: prep(시험 준비) / exam(시험) / rest(쉬는 시간)
  //   label: 화면에 표시할 활동명
  //   sub: 부연 설명 (필요시)
  // ============================================================
  const schedule = [
    { start: 525, end: 535, type: 'move', label: '이동반 시험실로 이동', sub: '지정된 시험실로 이동' },
    { start: 535, end: 540, type: 'prep', label: '1교시 시험 준비', sub: '문제지·답안지 수령' },
    { start: 540, end: 585, type: 'exam', label: '1교시 시험',     sub: '' },
    { start: 585, end: 595, type: 'rest', label: '쉬는 시간',       sub: '화장실 이용' },
    { start: 595, end: 600, type: 'prep', label: '2교시 시험 준비', sub: '문제지·답안지 수령' },
    { start: 600, end: 645, type: 'exam', label: '2교시 시험',     sub: '' },
    { start: 645, end: 655, type: 'rest', label: '쉬는 시간',       sub: '화장실 이용' },
    { start: 655, end: 660, type: 'prep', label: '3교시 시험 준비', sub: '문제지·답안지 수령' },
    { start: 660, end: 705, type: 'exam', label: '3교시 시험',     sub: '' }
  ];
  // 일과 끝 분 = 705 (11:45)

  // === DOM 요소 ===
  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const dateEl = document.getElementById('date');
  const timelineEl = document.getElementById('timeline');
  const statusCard = document.getElementById('status-card');
  const statusLabel = document.getElementById('status-label');
  const statusTitle = document.getElementById('status-title');
  const statusTime = document.getElementById('status-time');
  const statusSub = document.getElementById('status-sub');

  const weekdays = ['일', '월', '화', '수', '목', '금', '토'];

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function formatTime(mins) {
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return pad(h) + ':' + pad(m);
  }

  // === 타임라인 빌드 (1회만 생성) ===
  function buildTimeline() {
    timelineEl.innerHTML = '';
    schedule.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = `tl-item ${item.type}`;
      div.dataset.idx = idx;
      div.innerHTML = `
        <div class="tl-time">${formatTime(item.start)} ~ ${formatTime(item.end)}</div>
        <div class="tl-label">${item.label}</div>
      `;
      timelineEl.appendChild(div);
    });
  }

  // === 현재 상태 판정 및 UI 업데이트 ===
  function updateStatus(now) {
    const currentMinutes = now.getHours() * 60 + now.getMinutes();

    // 현재 활동 찾기
    let currentIdx = -1;
    for (let i = 0; i < schedule.length; i++) {
      if (currentMinutes >= schedule[i].start && currentMinutes < schedule[i].end) {
        currentIdx = i;
        break;
      }
    }

    // 타임라인 상태 업데이트
    const items = timelineEl.querySelectorAll('.tl-item');
    items.forEach((el, i) => {
      el.classList.remove('current', 'past');
      if (i === currentIdx) {
        el.classList.add('current');
      } else if (currentMinutes >= schedule[i].end) {
        el.classList.add('past');
      }
    });

    // 현재 상태 카드 업데이트
    statusCard.classList.remove('exam', 'rest', 'ended');

    const firstStart = schedule[0].start;
    const lastEnd = schedule[schedule.length - 1].end;

    if (currentIdx >= 0) {
      // 진행 중인 활동이 있음
      const item = schedule[currentIdx];
      statusCard.classList.add(item.type);
      statusLabel.textContent = '지금은';
      statusTitle.textContent = item.label;
      statusTime.textContent = `${formatTime(item.start)} ~ ${formatTime(item.end)}`;
      statusSub.textContent = item.sub || '\u00A0';
    } else if (currentMinutes < firstStart) {
      // 시험 시작 전
      statusLabel.textContent = '안내';
      statusTitle.textContent = '잠시 후 시험 시작';
      statusTime.textContent = `${formatTime(firstStart)} 시작 예정`;
      statusSub.textContent = '시험 준비를 시작해 주세요';
    } else if (currentMinutes >= lastEnd) {
      // 시험 종료
      statusCard.classList.add('ended');
      statusLabel.textContent = '안내';
      statusTitle.textContent = '시험 종료';
      statusTime.textContent = '오늘 시험이 모두 끝났습니다';
      statusSub.textContent = '\u00A0';
    } else {
      // schedule 사이의 갭 (정의되지 않은 시간) - 사실상 없지만 안전장치
      statusLabel.textContent = '대기';
      statusTitle.textContent = '다음 활동 대기 중';
      statusTime.textContent = '\u00A0';
      statusSub.textContent = '\u00A0';
    }
  }

  // === 시계 + 상태 업데이트 ===
  function updateAll() {
    const now = new Date();
    const h = pad(now.getHours());
    const m = pad(now.getMinutes());

    if (hoursEl.textContent !== h) hoursEl.textContent = h;
    if (minutesEl.textContent !== m) minutesEl.textContent = m;

    const y = now.getFullYear();
    const mo = now.getMonth() + 1;
    const d = now.getDate();
    const w = weekdays[now.getDay()];
    const dateStr = `${y}년 ${mo}월 ${d}일 ${w}요일`;
    if (dateEl.textContent !== dateStr) dateEl.textContent = dateStr;

    updateStatus(now);
  }

  // === 초기화 ===
  buildTimeline();
  updateAll();

  // 다음 분 경계까지 대기 후 1분 간격 갱신
  const now = new Date();
  const msUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();

  setTimeout(() => {
    updateAll();
    setInterval(updateAll, 60000);
  }, msUntilNextMinute);

  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }
</script>

</body>
</html>
