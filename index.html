<style>

  :root {

    --accent: #a83232; --accent-soft: #fff4e8;
    --rest: #3f6b26; --rest-soft: #eef3e5;
    --move: #8a5a2b; --move-soft: #f5ecdf;
    --prep: #1e3a5f; --prep-soft: #e8eff7;
    --line: #d4cfc0; --panel-bg: #e4efd4;
    --panel-line: #8fb378;
  }

  .exam { --theme-color: var(--accent); --theme-soft: var(--accent-soft); --theme-shadow: rgba(168, 50, 50, 0.25); }
  .rest { --theme-color: var(--rest); --theme-soft: var(--rest-soft); --theme-shadow: rgba(63, 107, 38, 0.25); }
  .move { --theme-color: var(--move); --theme-soft: var(--move-soft); --theme-shadow: rgba(138, 90, 43, 0.25); }
  .prep { --theme-color: var(--prep); --theme-soft: var(--prep-soft); --theme-shadow: rgba(30, 58, 95, 0.25); }

  html, body { height: 100%; width: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
    position: relative; -webkit-font-smoothing: antialiased;
  }

  .corner { position: fixed; width: clamp(42px, 2.5vw, 90px); height: clamp(42px, 2.5vw, 90px); pointer-events: none; z-index: 5; }
  .corner::before, .corner::after { content: ''; position: absolute; background: var(--navy); }
  .corner.tl { top: clamp(18px, 1.2vw, 36px); left: clamp(18px, 1.2vw, 36px); }
  .corner.tr { top: clamp(18px, 1.2vw, 36px); right: clamp(18px, 1.2vw, 36px); transform: scaleX(-1); }
  .corner.bl { bottom: clamp(18px, 1.2vw, 36px); left: clamp(18px, 1.2vw, 36px); transform: scaleY(-1); }
  .corner.br { bottom: clamp(18px, 1.2vw, 36px); right: clamp(18px, 1.2vw, 36px); transform: scale(-1, -1); }
  .corner::before { top: 0; left: 0; width: 100%; height: 3px; }
  .corner::after  { top: 0; left: 0; width: 3px; height: 100%; }

  .accent-bar { position: fixed; top: 50%; transform: translateY(-50%); width: clamp(6px, 0.4vw, 12px); height: 30vh; background: var(--accent); z-index: 4; }
  .accent-bar.left { left: 0; } .accent-bar.right { right: 0; }

  .main { height: 100%; display: flex; flex-direction: column; padding: clamp(20px, 3vh, 60px) clamp(40px, 4vw, 120px); }
  .dashboard { flex: 1; display: grid; grid-template-columns: minmax(340px, 33.33%) 1fr; gap: clamp(18px, 1.8vw, 48px); max-width: 3400px; width: 100%; margin: 0 auto; min-height: 0; }

  .left-panel { background: var(--panel-bg); border: 1px solid var(--panel-line); border-top: clamp(6px, 0.5vw, 12px) solid var(--rest); border-radius: 6px; padding: clamp(18px, 1.8vh, 36px) clamp(16px, 1.4vw, 28px); display: flex; flex-direction: column; box-shadow: 0 4px 16px rgba(0,0,0,0.08); min-height: 0; }
  .timeline-wrapper { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .timeline { display: flex; flex-direction: column; gap: clamp(14px, 1.8vh, 24px); flex: 1; overflow-y: auto; padding: 0 clamp(6px, 0.8vw, 14px) 0 clamp(6px, 0.8vw, 14px); }
  
  .timeline::-webkit-scrollbar { width: clamp(8px, 0.6vw, 14px); }
  .timeline::-webkit-scrollbar-track { background: var(--panel-bg); border-radius: 4px; }
  .timeline::-webkit-scrollbar-thumb { background: var(--panel-line); border-radius: 4px; }

  .tl-item { 
    background: var(--bg-card); 
    border: clamp(2px, 0.15vw, 3px) solid var(--theme-color, var(--panel-line)); 
    border-radius: 6px; 
    padding: clamp(14px, 1.8vh, 24px) clamp(16px, 1.6vw, 28px); 
    position: relative; transition: all 0.5s ease; 
    min-height: clamp(70px, 6.5vh, 96px); 
    display: flex; flex-direction: column; justify-content: center; margin: 0 clamp(4px, 0.5vw, 10px); 
  }
  .tl-item::before { 
    content: ''; position: absolute; left: clamp(-12px, -1vw, -20px); top: 50%; transform: translateY(-50%); 
    width: clamp(16px, 1.1vw, 26px); height: clamp(16px, 1.1vw, 26px); 
    background: var(--theme-color, var(--bg-card)); 
    border: clamp(3px, 0.25vw, 5px) solid var(--theme-color, var(--panel-line)); 
    border-radius: 50%; z-index: 3; transition: all 0.5s ease; box-shadow: 0 2px 6px rgba(0,0,0,0.1); 
  }

  .tl-text { display: flex; flex-direction: column; gap: clamp(6px, 0.8vh, 12px); }
  .tl-time { font-weight: 700; font-size: clamp(1.6rem, 1.5vw, 2.8rem); font-variant-numeric: tabular-nums; }
  .tl-label { font-weight: 600; font-size: clamp(1.4rem, 1.4vw, 2.6rem); color: var(--ink-soft); line-height: 1.3; white-space: nowrap; }

  .tl-item.current { 
    background: var(--theme-color, var(--navy));
    border-width: clamp(3px, 0.3vw, 5px);
    box-shadow: 0 8px 28px var(--theme-shadow), 0 2px 8px rgba(0,0,0,0.15);
  }
  .tl-item.current .tl-time,
  .tl-item.current .tl-label { color: #ffffff; }
  .tl-item.current::before { 
    width: clamp(20px, 1.3vw, 32px); height: clamp(20px, 1.3vw, 32px); 
    background: #ffffff;
    border-color: #ffffff; box-shadow: 0 0 0 clamp(4px, 0.3vw, 7px) var(--theme-shadow); 
  }
  .tl-item.past { opacity: 0.5; }

  .right-panel { background: var(--bg-card); border: 1px solid var(--line); border-top: clamp(6px, 0.5vw, 12px) solid var(--accent); border-radius: 6px; padding: clamp(18px, 1.8vh, 40px) clamp(20px, 2.2vw, 60px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; min-height: 0; overflow: hidden; }
  .right-header { display: flex; align-items: center; flex-wrap: wrap; gap: clamp(12px, 1.2vw, 28px); width: 100%; padding-bottom: clamp(10px, 1.2vh, 24px); margin-bottom: clamp(14px, 1.5vh, 30px); border-bottom: 2px solid var(--line); }
  .right-header img { width: clamp(48px, min(3vw, 5vh), 100px); flex-shrink: 0; }
  .right-header .school-name, .right-header .exam-title { font-weight: 700; font-size: clamp(1.3rem, 1.5vw, 2.5rem); word-break: keep-all; }
  .right-header .school-name { color: var(--navy); }
  .right-header .exam-title { color: var(--accent); }
  .divider-v { width: clamp(2px, 0.15vw, 4px); height: clamp(30px, 3vh, 56px); background: var(--line); flex-shrink: 0; }

  /* Day select styled dropdown */
  .day-select {
    margin-left: auto;
    font-size: clamp(1rem, 1.1vw, 1.6rem);
    font-weight: 700;
    color: var(--navy);
    border: 2px solid var(--line);
    background-color: var(--bg-card);
    border-radius: 6px;
    padding: clamp(4px, 0.4vh, 8px) clamp(10px, 1vw, 20px);
    cursor: pointer;
    outline: none;
    transition: all 0.2s ease;
  }
  .day-select:hover {
    border-color: var(--navy);
  }

  .main-display { display: flex; flex-direction: column; align-items: center; gap: clamp(14px, 1.5vh, 28px); width: 100%; flex: 1; justify-content: flex-start; padding-top: clamp(6px, 1vh, 24px); overflow: hidden; }
  .clock-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 1400px;
    margin-bottom: clamp(12px, 2vh, 32px);
    position: relative;
  }
  .clock-badge {
    position: absolute;
    left: clamp(16px, 1.5vw, 32px);
    top: 50%;
    transform: translateY(-50%);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--navy);
    color: #ffffff;
    font-size: clamp(0.85rem, 0.9vw, 1.3rem);
    font-weight: 700;
    padding: 0.2em 0.8em;
    border-radius: 4px;
    letter-spacing: 0.1em;
    white-space: nowrap;
    line-height: 1;
  }
  .date-line {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    font-weight: 600;
    font-size: clamp(1.1rem, 1.2vw, 2rem);
    color: var(--ink-soft);
    margin: clamp(4px, 0.6vh, 12px) 0 clamp(4px, 0.4vh, 10px);
    padding: 0 clamp(80px, 8vw, 140px);
    word-break: keep-all;
    text-align: center;

  .clock { font-weight: 700; font-size: clamp(8rem, min(16vw, 24vh), 26rem); line-height: 0.9; font-variant-numeric: tabular-nums; text-align: center; }
  .clock .colon { color: var(--accent); margin: 0 0.03em; }

  .status-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 1400px;
    position: relative;
  }

  .status-top-line {
    position: relative;

    width: 100%;

    text-align: center;
  }
  .status-card-inner { 
    width: 100%; 
    background: var(--theme-soft, var(--bg));

    border-radius: 4px;
    letter-spacing: 0.1em;
    white-space: nowrap;

  .status-title { font-weight: 700; font-size: clamp(2.8rem, min(3.8vw, 6.5vh), 7rem); color: var(--theme-color, var(--navy)); text-align: center; word-break: keep-all; line-height: 1.2; }
  .status-time { font-weight: 700; font-size: clamp(1.8vw, 2vw, 3rem); font-variant-numeric: tabular-nums; text-align: center; }

  .notice-banner {
    width: 100%;

    justify-content: center;

    0% { transform: scale(1); }
    100% { transform: scale(1.15); }

  .fullscreen-btn {
    margin-left: 12px;
    background: none;
    border: 2px solid var(--line);

    border-radius: 6px;

    height: clamp(36px, 3.2vw, 52px);

  .fullscreen-btn:hover {

    .divider-v { display: none; }
    .dashboard { grid-template-columns: 1fr; gap: 2vh; }
    .clock { font-size: clamp(6rem, 12vw, 18rem); }

        "type": "prep",
        "label": "2교시 시험준비(착석)",
        "sub": "답안지·문제지 수령"
      },
      {
        "start": 600,
        "end": 645,
        "type": "exam",
        "label": "2교시 시험",
        "sub": "인적사항과 과목코드, 정답을 답안지에 정확하게 표시하세요."
      }
    ]
  }
];
  let currentDayIndex = 0;
  let schedule = examDays[currentDayIndex].schedule;
  const urlParams = new URLSearchParams(window.location.search);

  const formatTime = mins => `${String(Math.floor(mins / 60)).padStart(2, '0')}:${String(mins % 60).padStart(2, '0')}`;
  
  const els = {
    hours: document.getElementById('hours'), minutes: document.getElementById('minutes'),
    date: document.getElementById('date'), timeline: document.getElementById('timeline'),
    card: document.getElementById('status-card'), label: document.getElementById('status-label'),
    title: document.getElementById('status-title'), time: document.getElementById('status-time'),
    sub: document.getElementById('status-sub'), select: document.getElementById('day-select')
  };

  function buildTimeline() {
    els.timeline.innerHTML = schedule.map((item, idx) => `
      <div class="tl-item ${item.type}" data-idx="${idx}">
        <div class="tl-text">
          <div class="tl-time">${formatTime(item.start)} ~ ${formatTime(item.end)}</div>
          <div class="tl-label">${item.label}</div>
        </div>
      </div>
    `).join('');
  }

  function updateStatus(now) {
    const currentMins = now.getHours() * 60 + now.getMinutes();
    const currentIdx = schedule.findIndex(item => currentMins >= item.start && currentMins < item.end);

    const today = new Date();
    const todayFormatted = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    const todayIdx = examDays.findIndex(d => d.date === todayFormatted);
    const hasTimeOverride = urlParams.get('time') || urlParams.get('mode') === 'test';
    const isBeforeExam = !hasTimeOverride && todayIdx < 0 && todayFormatted < examDays[0].date;
    const isAfterExam = !hasTimeOverride && todayIdx < 0 && todayFormatted > examDays[examDays.length - 1].date;

    Array.from(els.timeline.children).forEach((el, i) => {
      if (isBeforeExam) {
        el.className = `tl-item ${schedule[i].type}`;
      } else if (isAfterExam) {
        el.className = `tl-item ${schedule[i].type} past`;
      } else {
        el.className = `tl-item ${schedule[i].type} ${i === currentIdx ? 'current' : currentMins >= schedule[i].end ? 'past' : ''}`;
      }
    });

    els.card.className = 'status-card';
    els.time.style.display = '';
    
    if (isBeforeExam) {
      els.label.textContent = '안내';
      els.title.textContent = '시험 일정 안내';
      if (examDays.length === 1) {
        const [y, m, d] = examDays[0].date.split('-');
        els.time.textContent = `${y}년 ${Number(m)}월 ${Number(d)}일 (${examDays[0].dayLabel})`;
        els.sub.textContent = '차분한 마음으로 시험을 준비하세요';
      } else {
        const firstD = examDays[0].date.split('-');
        const lastD = examDays[examDays.length - 1].date.split('-');
        els.time.textContent = `${Number(firstD[1])}월 ${Number(firstD[2])}일 ~ ${Number(lastD[1])}월 ${Number(lastD[2])}일 (${examDays.length}일간)`;
        els.sub.textContent = `첫 시험일: ${examDays[0].dayLabel} (${Number(firstD[1])}월 ${Number(firstD[2])}일)`;
      }
      return;
    }

    if (isAfterExam) {
      els.card.classList.add('ended');
      els.label.textContent = '안내';
      els.title.textContent = '시험 종료';
      els.time.textContent = '시험이 모두 끝났습니다';
      els.sub.textContent = '모두 수고하셨습니다';
      return;
    }

    if (!hasTimeOverride && todayIdx < 0 && todayFormatted > examDays[0].date && todayFormatted < examDays[examDays.length - 1].date) {
      const nextDay = examDays.find(d => d.date > todayFormatted);
      els.label.textContent = '안내';
      els.title.textContent = '다음 시험 안내';
      if (nextDay) {
        const nD = nextDay.date.split('-');
        els.time.textContent = `${nextDay.dayLabel} (${Number(nD[1])}월 ${Number(nD[2])}일)`;
        els.sub.textContent = '다음 시험을 준비하세요';
      } else {
        els.time.textContent = '\u00A0'; els.sub.textContent = '\u00A0';
      }
      return;
    }

    if (currentIdx >= 0) {
      const item = schedule[currentIdx];
      els.card.classList.add(item.type);
      els.label.textContent = '지금은'; els.title.textContent = item.label;
      els.time.textContent = ''; els.time.style.display = 'none';
      els.sub.textContent = item.sub || '\u00A0';
    } else if (currentMins < schedule[0].start) {
      els.label.textContent = '안내'; els.title.textContent = '08시 40분까지 등교';
      els.time.textContent = '\u00A0'; els.time.style.display = 'none'; els.sub.textContent = '\u00A0';
    } else if (currentMins >= schedule[schedule.length - 1].end) {
      els.card.classList.add('ended');
      if (currentDayIndex === examDays.length - 1 || examDays.length === 1) {
        els.label.textContent = '안내'; els.title.textContent = '시험 종료';
        els.time.textContent = '시험이 모두 끝났습니다'; els.sub.textContent = '모두 수고하셨습니다';
      } else {
        els.label.textContent = '안내'; els.title.textContent = '오늘 시험 종료';
        els.time.textContent = '오늘 시험이 모두 끝났습니다';
        const nextDay = examDays[currentDayIndex + 1];
        if (nextDay) {
          const nD = nextDay.date.split('-');
          els.sub.textContent = `다음 시험: ${nextDay.dayLabel} (${Number(nD[1])}월 ${Number(nD[2])}일)`;
        } else {
          els.sub.textContent = '\u00A0';
        }
      }
    } else {
      els.label.textContent = '대기'; els.title.textContent = '다음 활동 대기 중';
      els.time.textContent = '\u00A0'; els.time.style.display = 'none'; els.sub.textContent = '\u00A0';
    }
  }

  function formatShortDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${Number(m)}/${Number(d)}`;
  }

  function switchDay(index) {
    if (index < 0 || index >= examDays.length) return;
    currentDayIndex = index;
    schedule = examDays[currentDayIndex].schedule;
    if (els.select) els.select.value = index;
    buildTimeline();
    updateAll();
  }

  function updateAll() {
    let now = new Date();

    // URL 파라미터로 특정 시각 테스트 가능 (예: ?time=09:10)
    const testTime = urlParams.get('time');
    if (testTime && testTime.includes(':')) {
      const [h, m] = testTime.split(':').map(Number);
      if (!isNaN(h) && !isNaN(m)) {
        now = new Date(now);
        now.setHours(h);
        now.setMinutes(m);
        now.setSeconds(0);
      }
    }

    // URL 파라미터로 특정 날짜 및 일차 테스트 기능
    const testDate = urlParams.get('date');
    if (testDate && testDate.includes('-')) {
      const matchedIdx = examDays.findIndex(d => d.date === testDate);
      if (matchedIdx >= 0 && matchedIdx !== currentDayIndex) {
        currentDayIndex = matchedIdx;
        schedule = examDays[currentDayIndex].schedule;
        if (els.select) els.select.value = currentDayIndex;
        buildTimeline();
      }
    }
    
    const testDayParam = urlParams.get('day');
    if (testDayParam) {
      const dayNum = Number(testDayParam) - 1;
      if (!isNaN(dayNum) && dayNum >= 0 && dayNum < examDays.length && dayNum !== currentDayIndex) {
        currentDayIndex = dayNum;
        schedule = examDays[currentDayIndex].schedule;
        if (els.select) els.select.value = currentDayIndex;
        buildTimeline();
      }
    }

    // 시간 숫자 텍스트 표시
    els.hours.textContent = String(now.getHours()).padStart(2, '0');
    els.minutes.textContent = String(now.getMinutes()).padStart(2, '0');
    
    // 날짜 및 요일 표시: 시험 일차가 현재 시스템 날짜와 일치하거나, 시험일 외의 날짜(프리뷰 모드)인 경우 오늘 실제 날짜를 표시
    const today = new Date();
    const todayFormatted = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    const todayIdx = examDays.findIndex(d => d.date === todayFormatted);
    
    let targetDate;
    if (todayIdx === currentDayIndex) {
      targetDate = now;
    } else if (todayIdx < 0 && currentDayIndex === 0 && !urlParams.get('date') && !urlParams.get('day')) {
      targetDate = now;
    } else {
      targetDate = new Date(examDays[currentDayIndex].date + 'T00:00:00');
    }
    const daysArr = ['일', '월', '화', '수', '목', '금', '토'];
    els.date.textContent = `${targetDate.getFullYear()}년 ${targetDate.getMonth() + 1}월 ${targetDate.getDate()}일 ${daysArr[targetDate.getDay()]}요일`;
    
    updateStatus(now);
  }

  // 일차 변경 드롭다운 설정
  if (els.select) {
    const today = new Date();
    const todayFormatted = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    const isExamDay = examDays.some(d => d.date === todayFormatted);
    const hasQueryOverride = urlParams.get('day') || urlParams.get('date') || urlParams.get('time') || urlParams.get('mode') === 'test';

    if (examDays.length <= 1 || (isExamDay && !hasQueryOverride)) {
      // 등록된 시험일이 1개이거나 실제 시험 당일에는 드롭다운을 숨겨 혼동을 원천 차단
      els.select.style.display = 'none';
    } else {
      // 시험 전 준비/테스트 기간이거나 수동 테스트 매개변수가 있을 때만 드롭다운 노출
      els.select.style.display = 'inline-block';
      els.select.innerHTML = examDays.map((d, i) => `
        <option value="${i}">${d.dayLabel} (${formatShortDate(d.date)})</option>
      `).join('');
      els.select.addEventListener('change', (e) => {
        switchDay(Number(e.target.value));
      });
    }
  }

  // 오늘 날짜와 일치하는 시험 일차가 있다면 기본값으로 자동 실행
  const today = new Date();
  const todayFormatted = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
  const todayIdx = examDays.findIndex(d => d.date === todayFormatted);
  if (todayIdx >= 0) {
    currentDayIndex = todayIdx;
    schedule = examDays[currentDayIndex].schedule;
    if (els.select) els.select.value = currentDayIndex;
  }

  buildTimeline(); updateAll();
  
  const msUntilNextMinute = (60 - new Date().getSeconds()) * 1000 - new Date().getMilliseconds();
  setTimeout(() => { updateAll(); setInterval(updateAll, 60000); }, msUntilNextMinute);

  if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});

  // Fullscreen support
  const fsBtn = document.getElementById('fullscreen-btn');
  if (fsBtn) {
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.error(`Error attempting to enable fullscreen: ${err.message}`);
        });
      } else {
        document.exitFullscreen().catch(err => {
          console.error(`Error attempting to exit fullscreen: ${err.message}`);
        });
      }
    });

    document.addEventListener('fullscreenchange', () => {
      const isFs = !!document.fullscreenElement;
      document.body.classList.toggle('fullscreen-active', isFs);
      const expandIcon = fsBtn.querySelector('.icon-expand');
      const shrinkIcon = fsBtn.querySelector('.icon-shrink');
      if (isFs) {
        expandIcon.style.display = 'none';
        shrinkIcon.style.display = 'block';
        fsBtn.title = '전체화면 해제';
      } else {
        expandIcon.style.display = 'block';
        shrinkIcon.style.display = 'none';
        fsBtn.title = '전체화면 토글';
      }
    });
  }
</script>
</body>
</html>
